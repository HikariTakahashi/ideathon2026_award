<!doctype html>

  <body style="margin: 0; padding: 0; background-color: #f4f1e8">
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      border="0"

    >
      <tr>
        <td align="center">
          <table

            width="720"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="

              max-width: 100%;
              background-color: #fffdf6;
              font-family:
                &quot;Hiragino Mincho ProN&quot;, &quot;Yu Mincho&quot;,
                &quot;YuMincho&quot;, &quot;Times New Roman&quot;, serif;
              color: #2b261b;

            "

            <tr>
              <td

                  height: 840px;
                  background-color: #fffdf6;

                  background-repeat: no-repeat;
                  background-position: center top;
                  background-size: 100% 100%;
                  padding: 128px 96px 112px;
                  text-align: center;
                  writing-mode: horizontal-tb;
                  -webkit-writing-mode: horizontal-tb;
                "
              >
                <div

                    min-height: 778px;
                    margin: 0 auto;
                    text-align: center;
                    writing-mode: horizontal-tb;
                    -webkit-writing-mode: horizontal-tb;
                  "
                >
                  <img
                    src="https://raw.githubusercontent.com/HikariTakahashi/ideathon2026_award/857ed64fd4579892a37f5f2a04d97b198e5ac186/image.png"

                    width="120"
                    height="120"

                      width: 100%;
                      max-width: 120px;
                      height: auto;
                      margin: 0 auto 18px;
                      border: 0;
                      border-radius: 50%;
                    "
                  />
                  <div
                    style="
                      font-size: 15px;
                      line-height: 1.6;
                      letter-spacing: 0;
                      color: #7a6323;

                        &quot;Hiragino Sans&quot;, &quot;Yu Gothic&quot;, Arial,
                        sans-serif;
                    "

                    三団体合同アイデアソン
                  </div>

                  <h1
                    style="
                      margin: 16px 0 24px;
                      font-size: 48px;
                      line-height: 1.2;
                      font-weight: 700;
                      letter-spacing: 0;
                      color: #3b2f12;
                    "
                  >
                    最優秀賞
                  </h1>

                  <div
                    style="
                      min-height: 44px;
                      margin: 0 auto 28px;
                      font-size: 28px;
                      line-height: 1.5;
                      font-weight: 700;
                      letter-spacing: 0;
                    "
                  >
                    &nbsp;
                  </div>

                  <p
                    style="
                      margin: 0 auto 30px;
                      max-width: 500px;
                      font-size: 18px;
                      line-height: 2;
                      text-align: left;
                      letter-spacing: 0;
                    "
                  >
                    貴チームは、本ハッカソンにおいて、ユーザー目線に立ったプロダクト設計、課題解決に資する適切な機能提案、プロダクトとしての実現可能性、ならびに将来の展望を踏まえた発展性の各観点において、優れた成果を示されました。限られた時間の中で、創造的な発想と確かな実装力を発揮し、課題の本質に向き合う姿勢は高く評価されるものです。ここにその功績を称えこの賞を授与いたします。
                  </p>

                  <div
                    style="
                      margin: 0 auto 22px;
                      max-width: 500px;
                      font-size: 17px;
                      line-height: 1.8;

                    2026年6月28日

                  <table

                    width="100%"
                    cellpadding="0"
                    cellspacing="0"

                      <td
                        align="center"
                        style="
                          padding: 0 0 8px;
                          font-size: 24px;
                          line-height: 1.5;
                          font-weight: 700;
